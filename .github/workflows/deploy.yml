name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    env:
      RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='release.tar.gz' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            -czf release.tar.gz .

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: release.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}/shared

      - name: Deploy release on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RELEASE_SHA: ${{ env.RELEASE_SHA }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: APP_ENV_FILE,DEPLOY_PATH,RELEASE_SHA
          script_stop: true
          script: |
            set -e

            RELEASE_DIR="$DEPLOY_PATH/releases/$RELEASE_SHA"
            SHARED_DIR="$DEPLOY_PATH/shared"
            CURRENT_DIR="$DEPLOY_PATH/current"

            mkdir -p "$DEPLOY_PATH/releases"
            mkdir -p "$SHARED_DIR/storage/app"
            mkdir -p "$SHARED_DIR/storage/framework/cache"
            mkdir -p "$SHARED_DIR/storage/framework/sessions"
            mkdir -p "$SHARED_DIR/storage/framework/views"
            mkdir -p "$SHARED_DIR/storage/logs"

            printf '%s' "$APP_ENV_FILE" > "$SHARED_DIR/.env"

            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "$SHARED_DIR/release.tar.gz" -C "$RELEASE_DIR"

            rm -f "$RELEASE_DIR/.env"
            rm -rf "$RELEASE_DIR/storage"
            ln -sfn "$SHARED_DIR/.env" "$RELEASE_DIR/.env"
            ln -sfn "$SHARED_DIR/storage" "$RELEASE_DIR/storage"

            cd "$RELEASE_DIR"
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"
            rm -f "$SHARED_DIR/release.tar.gz"
